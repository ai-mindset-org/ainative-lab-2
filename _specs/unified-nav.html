<!--
  UNIFIED NAV SNIPPET v1 — ainative-lab-2
  Use VERBATIM in every page (index, playground, rules, naming, knowledge-graph).
  Set <body data-route="..."> to one of: hub | play | rules | naming | graph
  to highlight the active route.
-->

<style>
  /* === unified nav === */
  .ai-nav {
    position: fixed; inset: 0 0 auto 0; z-index: 90;
    height: 52px; padding: 0 22px;
    display: flex; align-items: center; gap: 18px;
    background: rgba(7,9,13,0.86); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--ink-soft);
  }
  .ai-nav-brand {
    display: flex; align-items: center; gap: 9px;
    text-decoration: none; color: var(--ink);
    font-family: var(--font-heading);
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .ai-nav-brand img {
    height: 22px; width: auto;
    filter: invert(1) brightness(1.2);
  }
  .ai-nav-brand span { color: var(--ink); }
  .ai-nav-brand .ai-nav-tag {
    font-family: var(--font-body);
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 3px 7px;
    border: 1px solid var(--line);
    border-radius: 999px;
  }
  .ai-nav-links {
    flex: 1; display: flex; gap: 4px; align-items: center;
    margin-left: 12px;
  }
  .ai-nav-links a {
    text-decoration: none; color: var(--ink-dim);
    padding: 6px 11px; border: 1px solid transparent; border-radius: 6px;
    transition: all 0.16s ease;
    font-size: 12px;
  }
  .ai-nav-links a:hover {
    color: var(--teal);
    border-color: var(--line);
    background: rgba(92,218,204,0.06);
  }
  .ai-nav-links a.ext::after { content: " ↗"; opacity: 0.5; }
  /* active route — set via body[data-route] */
  body[data-route="hub"] .ai-nav-links a[data-route="hub"],
  body[data-route="play"] .ai-nav-links a[data-route="play"],
  body[data-route="rules"] .ai-nav-links a[data-route="rules"],
  body[data-route="naming"] .ai-nav-links a[data-route="naming"],
  body[data-route="graph"] .ai-nav-links a[data-route="graph"] {
    color: var(--teal);
    border-color: var(--line-strong);
    background: rgba(92,218,204,0.08);
  }
  .ai-nav-burger {
    display: none;
    background: none; border: 1px solid var(--line);
    color: var(--ink); font: 18px var(--font-body);
    width: 34px; height: 34px; border-radius: 6px; cursor: pointer;
  }
  @media (max-width: 760px) {
    .ai-nav { padding: 0 14px; }
    .ai-nav-links {
      position: absolute; top: 52px; left: 0; right: 0;
      flex-direction: column; gap: 0; align-items: stretch;
      background: rgba(7,9,13,0.96); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      padding: 8px;
      display: none;
    }
    .ai-nav-links a { padding: 12px 14px; border-radius: 0; }
    .ai-nav.open .ai-nav-links { display: flex; }
    .ai-nav-burger { display: grid; place-items: center; }
    .ai-nav-brand .ai-nav-tag { display: none; }
  }
  body { padding-top: 52px; }
  @media print {
    .ai-nav, .ai-foot { display: none; }
    body { padding-top: 0; }
  }
  /* === unified footer === */
  .ai-foot {
    margin-top: 64px;
    padding: 22px;
    border-top: 1px solid var(--line);
    display: grid; gap: 6px;
    color: var(--ink-dim);
    font-family: var(--font-body);
    font-size: 11px;
    line-height: 1.6;
  }
  .ai-foot-row { display: flex; flex-wrap: wrap; gap: 14px; justify-content: space-between; }
  .ai-foot a { color: var(--ink-soft); text-decoration: none; border-bottom: 1px dotted var(--line); }
  .ai-foot a:hover { color: var(--teal); border-bottom-color: var(--line-strong); }
  /* === role chip (set above h1 on each page) === */
  .ai-role {
    display: inline-block;
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--teal);
    font-family: var(--font-body);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
</style>

<header class="ai-nav" id="aiNav">
  <a class="ai-nav-brand" href="./index.html">
    <img src="./assets/aim-logo.png" alt="ai mindset" />
    <span>ainative-lab-2</span>
    <span class="ai-nav-tag">s3</span>
  </a>
  <nav class="ai-nav-links">
    <a href="./index.html" data-route="hub">hub</a>
    <a href="./playground.html" data-route="play">playground</a>
    <a href="./rules.html" data-route="rules">rules</a>
    <a href="./naming.html" data-route="naming">naming</a>
    <a href="./knowledge-graph.html" data-route="graph">graph</a>
    <a href="https://ainative-lab-deck.netlify.app/" class="ext" target="_blank" rel="noreferrer">deck</a>
  </nav>
  <button class="ai-nav-burger" id="aiBurger" aria-label="menu">≡</button>
</header>

<script>
  (function(){
    var nav = document.getElementById('aiNav');
    var b = document.getElementById('aiBurger');
    if (b && nav) b.addEventListener('click', function(){ nav.classList.toggle('open'); });
  })();
</script>

<!-- unified footer (paste at end of <body>) -->
<footer class="ai-foot">
  <div class="ai-foot-row">
    <span>ainative-lab-2 · ai-native sprint vol2 · s3 · 2026-05-06</span>
    <span>
      <a href="https://github.com/ai-mindset-org/ainative-lab-2" target="_blank" rel="noreferrer">github</a> ·
      <a href="https://aimindset.org" target="_blank" rel="noreferrer">ai mindset</a> ·
      <a href="https://ainative-lab-deck.netlify.app/" target="_blank" rel="noreferrer">deck</a>
    </span>
  </div>
  <div class="ai-foot-row">
    <span style="opacity:0.55">dragon-dna · space grotesk + ibm plex mono + jetbrains mono · single-file</span>
    <span style="opacity:0.55">v0.3 · 2026-05-06</span>
  </div>
</footer>
